services:
  dashboard:
    image: python:3.12-slim
    container_name: buenoserv-dashboard
    restart: always
    ports:
      - "8080:8080"
    environment:
      - HOME=/home/ricardobueno
    volumes:
      - /home/ricardobueno/.config/opencode:/home/ricardobueno/.config/opencode
      - /tmp/opencode:/tmp/opencode
    working_dir: /tmp/opencode/templates
    command: python3 serve_dashboard.py
    networks:
      - buenoserv

  api:
    image: python:3.12-slim
    container_name: buenoserv-api
    restart: always
    ports:
      - "8090:8090"
    environment:
      - HOME=/home/ricardobueno
    volumes:
      - /home/ricardobueno/.config/opencode:/home/ricardobueno/.config/opencode
      - /tmp/opencode:/tmp/opencode
    working_dir: /tmp/opencode/templates
    command: python3 gen_api.py 8090
    networks:
      - buenoserv

  whatsapp:
    image: python:3.12-slim
    container_name: buenoserv-whatsapp
    restart: always
    ports:
      - "8095:8095"
    environment:
      - HOME=/home/ricardobueno
    volumes:
      - /home/ricardobueno/.config/opencode:/home/ricardobueno/.config/opencode
      - /tmp/opencode:/tmp/opencode
    working_dir: /tmp/opencode/templates
    command: bash -c "pip install flask -q && python3 gen_bot_whatsapp.py"
    networks:
      - buenoserv

  openapi:
    image: python:3.12-slim
    container_name: buenoserv-openapi
    restart: always
    ports:
      - "8570:8570"
    environment:
      - HOME=/home/ricardobueno
    volumes:
      - /tmp/opencode:/tmp/opencode
    working_dir: /tmp/opencode/templates
    command: bash -c "pip install flask -q && python3 gen_openapi.py"
    networks:
      - buenoserv

  ai-model:
    image: buenoserv-ai-model
    container_name: buenoserv-ai-model
    restart: always
    ports:
      - "8560:8560"
    environment:
      - HOME=/home/ricardobueno
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - /home/ricardobueno/.config/opencode:/home/ricardobueno/.config/opencode
      - /tmp/opencode:/tmp/opencode
      - /mnt/ssd/buenoserv/models:/mnt/ssd/buenoserv/models
    working_dir: /tmp/opencode/templates
    command: python3 gen_ai_model_service.py
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    networks:
      - buenoserv

  nginx:
    image: nginx:alpine
    container_name: buenoserv-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /mnt/ssd/buenoserv/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /tmp/opencode/site:/usr/share/nginx/html:ro
    depends_on:
      - dashboard
      - api
    networks:
      - buenoserv

networks:
  buenoserv:
    external: true
