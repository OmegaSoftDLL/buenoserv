global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']

  - job_name: 'api'
    metrics_path: '/api/summary'
    static_configs:
      - targets: ['api:8090']

  - job_name: 'gpu'
    static_configs:
      - targets: ['gpu-exporter:9400']