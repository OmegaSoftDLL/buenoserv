server {
    listen 80;
    server_name localhost 192.168.1.10 buenoservengenharia.com;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /dashboard/ {
        proxy_pass http://dashboard:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://api:8090;
        proxy_set_header Host $host;
    }

    upstream ai_model_up { server ai-model:8560; }

    location /ai-model/ {
        proxy_pass http://ai_model_up/;
        proxy_set_header Host $host;
    }
}

    location /docs/ {
        proxy_pass http://openapi:8570/;
        proxy_set_header Host $host;
    }
}
